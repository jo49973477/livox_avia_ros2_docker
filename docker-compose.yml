version: '3.8'

services:
  ros2_eomma:
    image:  yeongyoo/livox_ros2_driver_avia:latest 
    container_name: livox_docker
    
    network_mode: "host"
    ipc: "host"
    pid: "host"
    
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=0 
    
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw 
    
    command: /bin/bash
    tty: true
    stdin_open: true